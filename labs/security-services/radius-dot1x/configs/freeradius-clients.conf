## ============================================================
## FreeRADIUS 3.x — clients.conf
## Platform  : FreeRADIUS 3.2.x on Ubuntu 22.04
## Role      : RADIUS server for 802.1X / MAB authentication
##
## File location: /etc/freeradius/3.0/clients.conf
##
## SECURITY NOTE: All shared secrets are placeholders.
##   <RADIUS-SECRET-HERE> : shared secret for each NAS client
##   Replace with strong randomly generated strings (min 32 chars)
##   Use different secrets per client — never reuse secrets
## ============================================================

## ── DEFAULT LOCALHOST (for testing / radtest) ─────────────────
client localhost {
    ipaddr          = 127.0.0.1
    secret          = <RADIUS-SECRET-HERE>
    shortname       = localhost
    nas_type        = other
    require_message_authenticator = no
}

## ── CISCO SW-ACCESS-01 (Cisco Catalyst 2960X) ────────────────
## Primary access switch — VLANs 10 (Corp), 20 (IT-Servers), 30 (Guests)
client SW-ACCESS-01 {
    ipaddr          = 10.0.10.200
    secret          = <RADIUS-SECRET-HERE>
    shortname       = SW-ACCESS-01
    nas_type        = cisco
    require_message_authenticator = yes
    ## Virtual Server: dot1x (if using virtual server dispatch)
    ## virtual_server = dot1x
}

## ── CISCO SW-ACCESS-02 (second access switch) ─────────────────
client SW-ACCESS-02 {
    ipaddr          = 10.0.10.201
    secret          = <RADIUS-SECRET-HERE>
    shortname       = SW-ACCESS-02
    nas_type        = cisco
    require_message_authenticator = yes
}

## ── CISCO WLC-01 (Wireless LAN Controller) ───────────────────
## WiFi 802.1X authentication — PEAP-MSCHAPv2
client WLC-01 {
    ipaddr          = 10.0.10.210
    secret          = <RADIUS-SECRET-HERE>
    shortname       = WLC-01
    nas_type        = cisco
    require_message_authenticator = yes
}

## ── FORTIGATE FGT-EDGE (as RADIUS client for admin auth) ─────
## FortiGate sends admin auth requests to RADIUS
client FGT-EDGE {
    ipaddr          = 10.0.10.1
    secret          = <RADIUS-SECRET-HERE>
    shortname       = FGT-EDGE
    nas_type        = other
    require_message_authenticator = no
}

## ── SUBNET CLIENT (whole management subnet) ──────────────────
## Allows any NAS in the management LAN to authenticate
## Useful for new switches before individual secrets are configured
## CAUTION: Use only in trusted management segments
client mgmt-subnet {
    ipaddr          = 10.0.10.0
    netmask         = 24
    secret          = <RADIUS-SECRET-HERE>
    shortname       = mgmt-subnet
    nas_type        = other
    require_message_authenticator = no
}

## ── NOTES ─────────────────────────────────────────────────────
## require_message_authenticator = yes
##   → Enforces RFC 3579 Message-Authenticator attribute.
##   → Required for EAP clients (802.1X).
##   → Cisco IOS sends this by default for EAP.
##   → Some older NAS devices may not support — set to no as fallback.
##
## nas_type = cisco
##   → Enables Cisco-specific VSA processing (Cisco-AVPair attribute)
##   → Used for dynamic VLAN assignment and CoA (Change of Authorization)
##
## Shared secret best practices:
##   - Minimum 32 random characters
##   - Avoid dictionary words
##   - Store in vault (HashiCorp Vault / Keepass)
##   - Rotate every 12 months (or after personnel change)
