## ============================================================
## FortiGate Configuration — FGT-INTERNAL
## Platform  : FortiGate-200F / FortiOS 7.4.x
## Role      : Internal NGFW — DMZ-IT ↔ DMZ-OT ↔ LAN-OT
##
## Interfaces:
##   port1 : DMZ-IT-ext  172.16.10.2/24  (connexion vers FGT-EDGE)
##   port2 : DMZ-OT      172.16.20.1/24
##   port3 : LAN-OT      172.16.30.1/24
##
## SECURITY NOTE: All sensitive values are placeholders.
##   <ADMIN-PASSWORD-HERE> : admin account password
##   <RADIUS-SECRET-HERE>  : RADIUS shared secret
##   <FORTI-ANALYZER-IP>   : FortiAnalyzer server IP
## ============================================================

## ── SYSTEM GLOBAL ──────────────────────────────────────────
config system global
    set hostname "FGT-INTERNAL"
    set admintimeout 10
    set timezone 28
    set strong-crypto enable
    set admin-https-ssl-versions tlsv1-2 tlsv1-3
    set gui-theme neutrino
    set language french
end

## ── ADMIN ACCOUNTS ─────────────────────────────────────────
config system admin
    edit "admin"
        set password <ADMIN-PASSWORD-HERE>
        set accprofile "super_admin"
        set vdom "root"
        ## Note: RADIUS authentication for admin — see config system radius below
        set remote-auth enable
        set remote-group "RADIUS-NET-ADMINS"
    next
end

## ── RADIUS AUTHENTICATION FOR ADMINS ──────────────────────
## IOS equivalent: aaa new-model + radius-server host
config system radius
    edit "RADIUS-CORP"
        set server "10.0.10.100"                ## FreeRADIUS server IP
        set secondary-server "10.0.10.100"
        set secret <RADIUS-SECRET-HERE>         ## Placeholder — RADIUS shared secret
        set auth-type ms_chap_v2
        set all-usergroup enable
        set use-management-vdom disable
    next
end

## ── NTP & DNS ──────────────────────────────────────────────
config system ntp
    set type custom
    set ntpsync enable
    config ntpserver
        edit 1
            set server "10.0.10.102"
        next
    end
end

config system dns
    set primary 10.0.10.101
end

## ── INTERFACES ─────────────────────────────────────────────
config system interface
    edit "port1"
        set alias "DMZ-IT-ext"
        set mode static
        set ip 172.16.10.2 255.255.255.0
        set allowaccess ping
        set role dmz
        set description "Connection to FGT-EDGE DMZ-IT (172.16.10.0/24)"
    next
    edit "port2"
        set alias "DMZ-OT"
        set mode static
        set ip 172.16.20.1 255.255.255.0
        set allowaccess ping
        set role dmz
        set description "DMZ-OT (IDMZ) — Historian OT, Patch server OT"
    next
    edit "port3"
        set alias "LAN-OT"
        set mode static
        set ip 172.16.30.1 255.255.255.0
        set allowaccess ping
        set role lan
        set description "LAN-OT — SCADA, HMI, Engineering workstations"
    next
end

## ── ZONES ──────────────────────────────────────────────────
config system zone
    edit "ZONE-DMZ-IT-EXT"
        set interface "port1"
    next
    edit "ZONE-DMZ-OT"
        set interface "port2"
    next
    edit "ZONE-LAN-OT"
        set interface "port3"
    next
end

## ── STATIC ROUTES ─────────────────────────────────────────
config router static
    edit 1
        set dst 0.0.0.0 0.0.0.0
        set device "port1"
        set gateway 172.16.10.1                 ## Default route via FGT-EDGE DMZ
        set distance 1
        set comment "Default route via FGT-EDGE"
    next
    edit 2
        set dst 10.0.10.0 255.255.255.0
        set device "port1"
        set gateway 172.16.10.1
        set comment "LAN-IT via FGT-EDGE"
    next
    edit 3
        set dst 172.16.20.0 255.255.255.0
        set device "port2"
        set comment "DMZ-OT local"
    next
    edit 4
        set dst 172.16.30.0 255.255.255.0
        set device "port3"
        set comment "LAN-OT local"
    next
end

## ── FIREWALL ADDRESS OBJECTS ──────────────────────────────
config firewall address
    edit "LAN-IT"
        set subnet 10.0.10.0 255.255.255.0
    next
    edit "DMZ-IT-Net"
        set subnet 172.16.10.0 255.255.255.0
    next
    edit "Jump-Server"
        set subnet 172.16.10.20 255.255.255.255
        set comment "Jump server in DMZ-IT"
    next
    edit "Historian-IT"
        set subnet 172.16.10.30 255.255.255.255
        set comment "IT Historian (PI)"
    next
    edit "DMZ-OT-Net"
        set subnet 172.16.20.0 255.255.255.0
    next
    edit "OT-Historian-Replica"
        set subnet 172.16.20.10 255.255.255.255
        set comment "OT Historian replica in DMZ-OT"
    next
    edit "OT-Patch-Server"
        set subnet 172.16.20.20 255.255.255.255
        set comment "OT patch server in DMZ-OT"
    next
    edit "LAN-OT-Net"
        set subnet 172.16.30.0 255.255.255.0
    next
    edit "SCADA-Server"
        set subnet 172.16.30.10 255.255.255.255
        set comment "SCADA supervision server"
    next
    edit "HMI-Workstation"
        set subnet 172.16.30.20 255.255.255.255
        set comment "HMI operator workstation"
    next
    edit "Eng-Workstation"
        set subnet 172.16.30.30 255.255.255.255
        set comment "Engineering workstation (PLC programming)"
    next
end

## ── CUSTOM SERVICES (OT protocols) ───────────────────────
config firewall service custom
    edit "Modbus-TCP"
        set protocol TCP
        set tcp-portrange 502
        set comment "Modbus TCP — SCADA to PLC"
    next
    edit "OPC-UA"
        set protocol TCP
        set tcp-portrange 4840 4843
        set comment "OPC-UA (4840 plain, 4843 TLS)"
    next
    edit "S7Comm"
        set protocol TCP
        set tcp-portrange 102
        set comment "Siemens S7 communication (ISO-TSAP)"
    next
    edit "DNP3"
        set protocol TCP/UDP
        set tcp-portrange 20000
        set udp-portrange 20000
        set comment "DNP3 - RTU/PLC polling"
    next
end

## ── IPS SENSORS ────────────────────────────────────────────
config ips sensor
    edit "IPS-OT-Strict"
        set comment "IPS strict pour trafic OT — bloquer attaques Modbus/S7/DNP3"
        config entries
            edit 1
                set severity critical high medium
                set action block
                set status enable
            next
            edit 2
                set application "Modbus"        ## Signature Modbus anomalie
                set action block
            next
        end
        set log-packet enable
    next
    edit "IPS-IDMZ-Monitor"
        set comment "IPS monitoring pour IDMZ — détecter sans bloquer"
        config entries
            edit 1
                set severity critical high
                set action block
                set status enable
            next
            edit 2
                set severity medium
                set action monitor
            next
        end
    next
end

## ── APPLICATION CONTROL OT ────────────────────────────────
config application list
    edit "AppCtrl-OT-Strict"
        set comment "Application control strict pour zones OT"
        config entries
            edit 1
                set category 2                  ## P2P
                set action block
            next
            edit 2
                set category 25                 ## Proxy / tunnel
                set action block
            next
            edit 3
                set category 17                 ## Remote admin (sauf autorisés)
                set action monitor
            next
        end
        set other-application-action block
        set other-application-log enable
    next
end

## ── FIREWALL POLICIES ─────────────────────────────────────
config firewall policy

    ## Policy 10 — Jump Server → LAN-OT (SSH/RDP admin via bastion)
    ## L'admin se connecte au Jump server (DMZ-IT) puis depuis le Jump au LAN-OT
    edit 10
        set name "JumpServer-to-LAN-OT-Admin"
        set srcintf "port1"
        set dstintf "port3"
        set srcaddr "Jump-Server"
        set dstaddr "LAN-OT-Net"
        set action accept
        set schedule "always"
        set service "SSH" "RDP"
        set logtraffic all
        set comments "Jump Server → LAN-OT: SSH/RDP admin — accès via bastion uniquement"
    next

    ## Policy 20 — Historian IT → OT Historian Replica (HTTPS read)
    edit 20
        set name "HistorianIT-to-OTHistorian"
        set srcintf "port1"
        set dstintf "port2"
        set srcaddr "Historian-IT"
        set dstaddr "OT-Historian-Replica"
        set action accept
        set schedule "always"
        set service "HTTPS"
        set utm-status enable
        set ips-sensor "IPS-IDMZ-Monitor"
        set logtraffic all
        set comments "IT Historian → OT Historian réplica: lecture données HTTPS"
    next

    ## Policy 30 — OT Historian Replica → SCADA (OPC-UA polling depuis DMZ-OT)
    edit 30
        set name "OTHistorian-poll-SCADA"
        set srcintf "port2"
        set dstintf "port3"
        set srcaddr "OT-Historian-Replica"
        set dstaddr "SCADA-Server"
        set action accept
        set schedule "always"
        set service "OPC-UA"
        set utm-status enable
        set ips-sensor "IPS-OT-Strict"
        set application-list "AppCtrl-OT-Strict"
        set logtraffic all
        set comments "OT Historian → SCADA: polling OPC-UA"
    next

    ## Policy 40 — SCADA → OT Historian Replica (push données)
    edit 40
        set name "SCADA-push-OTHistorian"
        set srcintf "port3"
        set dstintf "port2"
        set srcaddr "SCADA-Server"
        set dstaddr "OT-Historian-Replica"
        set action accept
        set schedule "always"
        set service "OPC-UA" "HTTPS"
        set utm-status enable
        set ips-sensor "IPS-OT-Strict"
        set logtraffic all
        set comments "SCADA → OT Historian: push données procédé"
    next

    ## Policy 50 — OT Patch Server → LAN-OT (déploiement patches)
    edit 50
        set name "OTPatch-to-LAN-OT"
        set srcintf "port2"
        set dstintf "port3"
        set srcaddr "OT-Patch-Server"
        set dstaddr "Eng-Workstation" "HMI-Workstation"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS" "SMB"
        set utm-status enable
        set ips-sensor "IPS-IDMZ-Monitor"
        set logtraffic all
        set comments "OT Patch server → Postes OT: déploiement patches (fenêtres maintenance)"
    next

    ## Policy 60 — LAN-OT → OT Patch Server (pull mises à jour)
    edit 60
        set name "LAN-OT-pull-patches"
        set srcintf "port3"
        set dstintf "port2"
        set srcaddr "Eng-Workstation"
        set dstaddr "OT-Patch-Server"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS"
        set logtraffic all
        set comments "Eng workstation → OT Patch server: pull MAJ contrôlé"
    next

    ## Policy 70 — SNMP monitoring (NMS → équipements LAN-OT)
    edit 70
        set name "SNMP-Monitor-LAN-OT"
        set srcintf "port1"
        set dstintf "port3"
        set srcaddr "10.0.10.50/32"             ## NMS server in LAN-IT
        set dstaddr "LAN-OT-Net"
        set action accept
        set schedule "always"
        set service "SNMP" "SNMP-Trap"
        set logtraffic all
        set comments "NMS (LAN-IT) → LAN-OT: supervision SNMP"
    next

    ## Policy 80 — LAN-OT → Internet : DENY ABSOLU
    edit 80
        set name "DENY-LAN-OT-Internet"
        set srcintf "port3"
        set dstintf "port1"
        set srcaddr "LAN-OT-Net"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set comments "DENY: LAN-OT vers Internet — flux montant OT→IT+Internet interdit"
    next

    ## Policy 90 — LAN-OT → LAN-IT : DENY ABSOLU
    edit 90
        set name "DENY-LAN-OT-LAN-IT"
        set srcintf "port3"
        set dstintf "port1"
        set srcaddr "LAN-OT-Net"
        set dstaddr "LAN-IT"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set comments "DENY: flux direct OT → IT interdit (doit passer par IDMZ)"
    next

    ## Policy 99 — Implicit DENY
    edit 99
        set name "IMPLICIT-DENY-ALL"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set comments "Default deny — tout flux non listé est refusé et journalisé"
    next
end

## ── LOGGING — FORTIANALYZER ───────────────────────────────
config log fortianalyzer setting
    set status enable
    set server <FORTI-ANALYZER-IP>              ## Placeholder — FortiAnalyzer IP
    set reliable enable
    set enc-algorithm high
    set upload-option realtime
end

config log setting
    set fwpolicy-implicit-log enable
    set local-in-deny enable
    set log-invalid-packet enable
end
