## ============================================================
## FortiGate Configuration — FGT-EDGE (Active member)
## Platform  : FortiGate-600E / FortiOS 7.4.x
## Role      : Perimeter NGFW — Internet ↔ DMZ-IT ↔ LAN-IT
##
## Interfaces:
##   port1 : WAN (Internet)
##   port2 : DMZ-IT  172.16.10.1/24
##   port3 : LAN-IT  10.0.10.1/24
##   port4 : HA heartbeat (192.168.100.1)
##   port5 : HA heartbeat backup
##
## SECURITY NOTE: All sensitive values are placeholders.
##   <ADMIN-PASSWORD-HERE> : admin account password (use strong password)
##   <PSK-HERE>            : HA cluster password
##   <WAN-IP-HERE>         : WAN interface IP address
##   <WAN-GW-HERE>         : WAN default gateway
##   <FORTI-ANALYZER-IP>   : FortiAnalyzer server IP
## ============================================================

## ── SYSTEM GLOBAL ──────────────────────────────────────────
config system global
    set hostname "FGT-EDGE-A"
    set admintimeout 10
    set timezone 28                             ## Europe/Paris (CET/CEST)
    set strong-crypto enable
    set admin-https-ssl-versions tlsv1-2 tlsv1-3
    set admin-ssh-port 22
    set gui-theme neutrino
    set language french
end

## ── ADMIN ACCOUNTS ─────────────────────────────────────────
config system admin
    edit "admin"
        set password <ADMIN-PASSWORD-HERE>      ## Placeholder — use vaultadmin password
        set accprofile "super_admin"
        set vdom "root"
        set two-factor fortitoken-cloud         ## MFA via FortiToken
    next
    edit "readonly-ops"
        set password <ADMIN-PASSWORD-HERE>
        set accprofile "read_only"
        set vdom "root"
    next
end

## ── NTP ────────────────────────────────────────────────────
config system ntp
    set type custom
    set ntpsync enable
    config ntpserver
        edit 1
            set server "10.0.10.102"            ## Internal NTP server (LAN-IT)
        next
        edit 2
            set server "pool.ntp.org"
        next
    end
end

## ── DNS ────────────────────────────────────────────────────
config system dns
    set primary 10.0.10.101                     ## Active Directory DNS
    set secondary 10.0.10.102
    set dns-over-tls enable
end

## ── INTERFACES ─────────────────────────────────────────────
config system interface
    edit "port1"
        set alias "WAN"
        set mode static
        set ip <WAN-IP-HERE> 255.255.255.252    ## Placeholder — WAN address from ISP
        set allowaccess ping
        set role wan
        set description "WAN - Internet uplink (ISP 1)"
        set mtu-override enable
        set mtu 1500
    next
    edit "port2"
        set alias "DMZ-IT"
        set mode static
        set ip 172.16.10.1 255.255.255.0
        set allowaccess ping
        set role dmz
        set description "DMZ-IT — Web/Jump/Historian servers"
    next
    edit "port3"
        set alias "LAN-IT"
        set mode static
        set ip 10.0.10.1 255.255.255.0
        set allowaccess ping https ssh
        set role lan
        set description "LAN-IT — Corporate network"
    next
    edit "port4"
        set alias "HA-HB1"
        set mode static
        set ip 192.168.100.1 255.255.255.252
        set allowaccess ping
        set role undefined
        set description "HA Heartbeat link 1 (FGT-EDGE-A)"
    next
    edit "port5"
        set alias "HA-HB2"
        set mode static
        set ip 192.168.101.1 255.255.255.252
        set allowaccess ping
        set role undefined
        set description "HA Heartbeat link 2 (backup)"
    next
end

## ── ZONES ──────────────────────────────────────────────────
config system zone
    edit "ZONE-WAN"
        set interface "port1"
    next
    edit "ZONE-DMZ-IT"
        set interface "port2"
    next
    edit "ZONE-LAN-IT"
        set interface "port3"
    next
end

## ── HA (FGCP Active-Passive) ──────────────────────────────
config system ha
    set group-name "FGT-EDGE-CLUSTER"
    set group-id 1
    set mode a-p                                ## Active-Passive (FGCP)
    set hbdev "port4" 50 "port5" 50            ## Heartbeat on port4 (prio 50) + port5
    set session-pickup enable                   ## Session failover
    set session-pickup-connectionless enable
    set session-pickup-delay 0
    set ha-mgmt-status enable
    config ha-mgmt-interfaces
        edit 1
            set interface "port3"              ## Use LAN-IT for mgmt access to passive
            set gateway 10.0.10.1
        next
    end
    set password <PSK-HERE>                     ## Placeholder — HA cluster pre-shared key
    set priority 150                            ## Higher = active member (A has 150, B has 100)
    set override disable                        ## Disable override — active stays active after failback
    set arps 5
    set arps-interval 8
    set memory-compatible-mode enable
end

## ── SD-WAN (Basic dual-ISP) ───────────────────────────────
config system sdwan
    set status enable
    config zone
        edit "virtual-wan-link"
        next
    end
    config members
        edit 1
            set interface "port1"
            set gateway <WAN-GW-HERE>           ## Placeholder — ISP 1 default gateway
            set source <WAN-IP-HERE>
            set cost 0
        next
    end
    config health-check
        edit "HC-Internet"
            set server "8.8.8.8"
            set interval 1000                   ## 1s interval
            set failtime 3
            set recoverytime 5
            set probe-count 30
            set members 1
        next
    end
    config service
        edit 1
            set name "SD-WAN-Default"
            set mode lowest-cost
            set health-check "HC-Internet"
            set members 1
        next
    end
end

## ── STATIC ROUTES ─────────────────────────────────────────
config router static
    edit 1
        set dst 0.0.0.0 0.0.0.0
        set device "port1"
        set gateway <WAN-GW-HERE>               ## Default route via ISP
        set distance 1
        set comment "Default route to Internet"
    next
    edit 2
        set dst 10.0.10.0 255.255.255.0
        set device "port3"
        set comment "LAN-IT local network"
    next
    edit 3
        set dst 172.16.10.0 255.255.255.0
        set device "port2"
        set comment "DMZ-IT local network"
    next
end

## ── FIREWALL ADDRESS OBJECTS ──────────────────────────────
config firewall address
    edit "LAN-IT"
        set subnet 10.0.10.0 255.255.255.0
        set comment "Corporate IT network"
    next
    edit "DMZ-IT"
        set subnet 172.16.10.0 255.255.255.0
        set comment "DMZ-IT servers"
    next
    edit "Web-Server"
        set subnet 172.16.10.10 255.255.255.255
        set comment "Web server in DMZ-IT"
    next
    edit "Jump-Server"
        set subnet 172.16.10.20 255.255.255.255
        set comment "Jump/bastion server in DMZ-IT"
    next
    edit "Historian-IT"
        set subnet 172.16.10.30 255.255.255.255
        set comment "IT Historian (PI) in DMZ-IT"
    next
    edit "WSUS-Mirror"
        set subnet 172.16.10.40 255.255.255.255
        set comment "WSUS/patch mirror in DMZ-IT"
    next
    edit "AD-Server"
        set subnet 10.0.10.101 255.255.255.255
        set comment "Active Directory server"
    next
end

## ── FIREWALL ADDRESS GROUPS ───────────────────────────────
config firewall addrgrp
    edit "DMZ-IT-Servers"
        set member "Web-Server" "Jump-Server" "Historian-IT" "WSUS-Mirror"
        set comment "All DMZ-IT server hosts"
    next
end

## ── NAT / VIP (DNAT — static NAT for DMZ servers) ────────
config firewall vip
    edit "VIP-WebServer-HTTPS"
        set type static-nat
        set extip <WAN-IP-HERE>                 ## Placeholder — public IP for web server
        set extintf "port1"
        set mappedip "172.16.10.10"
        set extport 443
        set mappedport 443
        set portforward enable
        set comment "DNAT: Internet HTTPS → Web-Server DMZ"
    next
    edit "VIP-Jump-SSH"
        set type static-nat
        set extip <WAN-IP-HERE>
        set extintf "port1"
        set mappedip "172.16.10.20"
        set extport 2222                        ## Non-standard port for security
        set mappedport 22
        set portforward enable
        set comment "DNAT: Internet SSH (2222) → Jump Server"
    next
end

## ── NAT POOL (SNAT) ───────────────────────────────────────
config firewall ippool
    edit "SNAT-WAN"
        set startip <WAN-IP-HERE>               ## Placeholder — SNAT source IP
        set endip <WAN-IP-HERE>
        set type overload                       ## PAT (port address translation)
        set comment "SNAT pool for LAN-IT and DMZ-IT outbound"
    next
end

## ── IPS SENSOR ────────────────────────────────────────────
config ips sensor
    edit "IPS-DMZ-Inbound"
        set comment "IPS profile for inbound DMZ traffic (Internet → DMZ-IT)"
        config entries
            edit 1
                set severity critical high
                set action block
                set status enable
            next
            edit 2
                set severity medium
                set action monitor
                set status enable
            next
        end
    next
    edit "IPS-LAN-Outbound"
        set comment "IPS for LAN-IT outbound — detect C2 callbacks"
        config entries
            edit 1
                set severity critical high medium
                set action monitor
                set status enable
                set location client
            next
        end
    next
end

## ── SSL INSPECTION PROFILE ────────────────────────────────
config firewall ssl-ssh-profile
    edit "SSL-DEEP-INSPECT-DMZ"
        set comment "Deep SSL inspection for DMZ inbound HTTPS"
        config https
            set status deep-inspection
            set ports 443 8443
        end
        config ftps
            set status certificate-inspection
        end
        config smtps
            set status certificate-inspection
        end
        set ssl-anomalies-log enable
        set ssl-negotiation-log enable
        set caname "Fortinet_CA_SSL"
    next
    edit "SSL-INSPECT-OUTBOUND"
        set comment "Certificate inspection for LAN outbound"
        config https
            set status certificate-inspection
            set ports 443
        end
    next
end

## ── APPLICATION CONTROL PROFILE ──────────────────────────
config application list
    edit "AppCtrl-LAN-IT"
        set comment "Application control for LAN-IT users"
        config entries
            edit 1
                set application 34050           ## Tor Browser
                set action block
            next
            edit 2
                set category 25                 ## P2P
                set action block
            next
            edit 3
                set category 6                  ## Proxy
                set action monitor
            next
        end
        set other-application-log enable
    next
end

## ── WEB FILTER PROFILE ────────────────────────────────────
config webfilter profile
    edit "WebFilter-LAN-IT"
        set comment "URL filtering for corporate IT users"
        config ftgd-wf
            config filters
                edit 1
                    set category 62             ## Hacking
                    set action block
                next
                edit 2
                    set category 26             ## Malware sites
                    set action block
                next
                edit 3
                    set category 9              ## Adult content
                    set action block
                next
            end
        end
        set log-all-url enable
    next
end

## ── FIREWALL POLICIES ─────────────────────────────────────
config firewall policy

    ## Policy 10 — LAN-IT → Internet (SNAT + App Control + URL filter)
    edit 10
        set name "LAN-IT-to-Internet"
        set srcintf "port3"
        set dstintf "port1"
        set srcaddr "LAN-IT"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS" "DNS"
        set nat enable
        set ippool enable
        set poolname "SNAT-WAN"
        set utm-status enable
        set application-list "AppCtrl-LAN-IT"
        set webfilter-profile "WebFilter-LAN-IT"
        set ssl-ssh-profile "SSL-INSPECT-OUTBOUND"
        set logtraffic all
        set comments "LAN-IT → Internet: HTTP/HTTPS avec App Control et URL filter"
    next

    ## Policy 20 — LAN-IT → DMZ-IT (Jump Server SSH/RDP)
    edit 20
        set name "LAN-IT-to-JumpServer"
        set srcintf "port3"
        set dstintf "port2"
        set srcaddr "LAN-IT"
        set dstaddr "Jump-Server"
        set action accept
        set schedule "always"
        set service "SSH" "RDP"
        set logtraffic all
        set comments "LAN-IT → Jump Server: SSH et RDP pour admins OT"
    next

    ## Policy 30 — LAN-IT → DMZ-IT (Historian accès lecture)
    edit 30
        set name "LAN-IT-to-Historian"
        set srcintf "port3"
        set dstintf "port2"
        set srcaddr "LAN-IT"
        set dstaddr "Historian-IT"
        set action accept
        set schedule "always"
        set service "HTTPS"
        set logtraffic all
        set comments "LAN-IT → IT Historian: lecture données HTTPS"
    next

    ## Policy 40 — Internet → DMZ-IT Web Server (HTTPS avec IPS + SSL deep)
    edit 40
        set name "Internet-to-WebServer"
        set srcintf "port1"
        set dstintf "port2"
        set srcaddr "all"
        set dstaddr "VIP-WebServer-HTTPS"
        set action accept
        set schedule "always"
        set service "HTTPS"
        set utm-status enable
        set ips-sensor "IPS-DMZ-Inbound"
        set ssl-ssh-profile "SSL-DEEP-INSPECT-DMZ"
        set nat enable                          ## NAT applied via VIP DNAT
        set logtraffic all
        set comments "Internet → Web Server DMZ: HTTPS avec IPS + SSL deep inspection"
    next

    ## Policy 50 — Internet → Jump Server (SSH port 2222 → 22)
    edit 50
        set name "Internet-to-JumpServer-SSH"
        set srcintf "port1"
        set dstintf "port2"
        set srcaddr "all"
        set dstaddr "VIP-Jump-SSH"
        set action accept
        set schedule "always"
        set service "SSH"
        set utm-status enable
        set ips-sensor "IPS-DMZ-Inbound"
        set logtraffic all
        set comments "Internet → Jump Server: SSH admin via DNAT (port 2222 → 22)"
    next

    ## Policy 99 — Implicit DENY (FortiGate default — logged)
    edit 99
        set name "IMPLICIT-DENY"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set comments "Default deny — log all blocked traffic"
    next
end

## ── LOGGING — FORTIANALYZER ───────────────────────────────
config log fortianalyzer setting
    set status enable
    set server <FORTI-ANALYZER-IP>              ## Placeholder — FortiAnalyzer IP
    set reliable enable                         ## Use reliable TCP log delivery
    set enc-algorithm high
end

config log setting
    set fwpolicy-implicit-log enable
    set local-in-deny enable
    set log-invalid-packet enable
end

## ── SNMP ───────────────────────────────────────────────────
config system snmp sysinfo
    set status enable
    set description "FGT-EDGE perimeter firewall"
    set contact-info "noc@site-a.local"
    set location "Salle-Reseau-A"
end

config system snmp community
    edit 1
        set name "<SNMP-COMMUNITY-HERE>"        ## Placeholder — SNMPv2c community
        config hosts
            edit 1
                set ip 10.0.10.50 255.255.255.255   ## NMS server
            next
        end
    next
end
